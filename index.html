<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobile bank</title>
    <!-- daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-700">
    <section class="max-w-md min-h-screen bg-gray-100 mx-auto py-6">
        <header>
            <nav class="mt-10 flex justify-center items-center">
               <div class="relative flex justify-center items-center mt-10 w-9/12 mb-10">
                 <img class="w-48 absolute" src="assets/bg.png" alt="">
                <img class="w-16" src="assets/Group.png" alt="">
               </div>
            </nav>
        </header>
        <!-- login -->
         <div>
  <div class="hero-content flex-col lg:flex-row-reverse">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Mobile Number</label>
          <input type="number" class="input" placeholder="Enter your number" />
          <label class="label">4 Digit Pin</label>
          <input type="text" class="input" placeholder="Enter 4 Digit Pin" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button class="btn bg-blue-600 border-none rounded-full btn-neutral mt-4">Login</button>
        </fieldset>
      </div>
    </div>
  </div>
</div>
    </section>
</body>
</html>
